# =============================================================================
# Critical Infrastructure Data Frameworks — ingestion-engine ServiceAccount
# =============================================================================
#
# Dedicated ServiceAccount for the cidf ingestion-engine workload.
#
# automountServiceAccountToken: false
#   This is an explicit least-privilege opt-in. By default Kubernetes
#   automatically mounts a ServiceAccount token into every Pod, granting
#   the process unauthenticated read access to the Kubernetes API. The
#   ingestion engine does not call the Kubernetes API at runtime — it
#   resolves secrets from HashiCorp Vault and writes data to S3/MinIO.
#   Disabling auto-mount removes an unnecessary credential surface from
#   the running container. If a future component (e.g. an operator or
#   sidecar) requires API access, enable the token explicitly on that
#   specific Pod spec rather than re-enabling it here.
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cidf-engine
  namespace: cidf-dev
  labels:
    app.kubernetes.io/name: cidf-engine
    app.kubernetes.io/component: ingestion-engine
    app.kubernetes.io/part-of: critical-infra-data-frameworks
automountServiceAccountToken: false
