# =============================================================================
# WARNING — REFERENCE STRUCTURE ONLY
# =============================================================================
#
# This file defines the SHAPE of the Secret that the ingestion engine requires.
# ALL values are base64-encoded placeholders — they are NOT real credentials.
#
# NEVER commit real credential values to this file or any version-controlled
# file. In a real environment:
#   - Populate this Secret using kubectl create secret, Vault Agent Injector,
#     or External Secrets Operator — never by editing this file.
#   - For local dev: `kubectl create secret generic cidf-engine-secrets \
#       --from-literal=VAULT_TOKEN=<your-dev-token> \
#       --from-literal=AWS_ACCESS_KEY_ID=<your-minio-user> \
#       --from-literal=AWS_SECRET_ACCESS_KEY=<your-minio-password> \
#       -n cidf-dev`
#   - See deployment/k8s/README.md for the full configuration override guide.
#
# The placeholder value `cmVwbGFjZS1tZQ==` is the base64 encoding of the
# string "replace-me". It will be rejected by the application at runtime,
# making misconfiguration loud rather than silent.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: cidf-engine-secrets
  namespace: cidf-dev
  labels:
    app.kubernetes.io/name: cidf-engine
    app.kubernetes.io/component: ingestion-engine
    app.kubernetes.io/part-of: critical-infra-data-frameworks
  annotations:
    cidf.io/secret-management: "PLACEHOLDER — see WARNING above and deployment/k8s/README.md"
type: Opaque
data:
  # base64("replace-me") = cmVwbGFjZS1tZQ==
  VAULT_TOKEN: cmVwbGFjZS1tZQ==
  AWS_ACCESS_KEY_ID: cmVwbGFjZS1tZQ==
  AWS_SECRET_ACCESS_KEY: cmVwbGFjZS1tZQ==
