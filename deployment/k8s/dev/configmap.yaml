# =============================================================================
# Critical Infrastructure Data Frameworks — ingestion-engine ConfigMap
# =============================================================================
#
# Non-secret runtime environment variables for the ingestion engine.
# It is safe to commit this file — no credentials are stored here.
#
# The values below match the local docker-compose dev stack
# (deployment/docker/docker-compose.yml), where Vault and MinIO are
# reached by their Compose service names over the internal bridge network.
#
# When running against a Kubernetes-native dev stack (Vault and MinIO
# deployed as Kubernetes Services in the same cluster), override these
# values to match the actual Service endpoints:
#
#   VAULT_ADDR       — NodePort or ClusterIP URL of the Vault Service,
#                      e.g. "http://vault.cidf-dev.svc.cluster.local:8200"
#                      or "http://<node-ip>:<node-port>" for NodePort.
#   AWS_S3_ENDPOINT  — NodePort or ClusterIP URL of the MinIO S3 API,
#                      e.g. "http://minio.cidf-dev.svc.cluster.local:9000"
#                      or "http://<node-ip>:<node-port>" for NodePort.
#
# Override at apply time with `kubectl create configmap` or patch the
# values in a Kustomize overlay — do not edit this file for env-specific
# tuning.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: cidf-engine-config
  namespace: cidf-dev
  labels:
    app.kubernetes.io/name: cidf-engine
    app.kubernetes.io/component: ingestion-engine
    app.kubernetes.io/part-of: critical-infra-data-frameworks
data:
  VAULT_ADDR: "http://vault:8200"
  AWS_S3_ENDPOINT: "http://minio:9000"
  AWS_S3_PATH_STYLE_ACCESS: "true"
