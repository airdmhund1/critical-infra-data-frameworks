# =============================================================================
# OWASP Dependency-Check — vulnerability scan for the full dependency tree
#
# Runs on every push to main and on every pull request.  The job is kept in a
# dedicated workflow (not inline in ci.yml) because the NVD database download
# can take several minutes and must not inflate the core compile/test cycle
# past the 12-minute target.
#
# Failure policy: any dependency with a CVSS score >= 7.0 (HIGH or CRITICAL)
# causes the job to exit non-zero, blocking the PR from merging.
#
# NVD API key: optional.  Without it, OWASP DC uses the public NVD data feed
# (slower download, same result).  To accelerate NVD data sync, add an
# NVD_API_KEY repository secret obtained from https://nvd.nist.gov/developers/request-an-api-key
# =============================================================================

name: Dependency Vulnerability Scan

on:
  push:
    branches:
      - main
  pull_request:

# Cancel in-flight scans for the same ref so stale runs do not queue up.
concurrency:
  group: dependency-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read        # checkout only
  security-events: write  # allow SARIF upload if added in future

jobs:
  owasp-dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Compute the ISO week number for the NVD cache key.
      #
      # This step must run before the cache step because GitHub Actions
      # evaluates env.* expressions in subsequent steps at runtime, not at
      # job-startup time.  The value is written to GITHUB_ENV so that all
      # subsequent steps in the job can reference it via ${{ env.WEEK_NUMBER }}.
      # -----------------------------------------------------------------------
      - name: Compute ISO week number for cache key
        run: echo "WEEK_NUMBER=$(date +%V)" >> "$GITHUB_ENV"

      # -----------------------------------------------------------------------
      # 3. Cache the NVD database
      #
      # Keyed on the ISO week number so the cache is considered stale and
      # refreshed automatically once per week.  A stale cache is not an error —
      # OWASP DC will re-download any missing data.
      # -----------------------------------------------------------------------
      - name: Cache NVD database
        uses: actions/cache@v4
        with:
          path: ~/.dependency-check/data
          # Week number rotates every 7 days; the cache will be refreshed on
          # the first run of each new calendar week.
          key: nvd-db-${{ runner.os }}-week${{ env.WEEK_NUMBER }}
          restore-keys: |
            nvd-db-${{ runner.os }}-

      # -----------------------------------------------------------------------
      # 4. Run OWASP Dependency-Check
      #
      # Action ref is pinned to a specific release tag, not @main, to satisfy
      # the "pinned versions for base images and dependencies" standard.
      #
      # Key flags:
      #   --failOnCVSS 7   — fail on HIGH (7.0-8.9) or CRITICAL (9.0-10.0)
      #   --enableExperimental — activates the sbt/ivy analyser
      #   --nvdApiKey      — optional; accelerates NVD data sync if the secret
      #                      is present, silently ignored if it is not
      # -----------------------------------------------------------------------
      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        env:
          JAVA_HOME: /opt/jdk
        with:
          project: critical-infra-data-frameworks
          path: '.'
          format: 'ALL'           # produces HTML, XML, JSON and SARIF reports
          args: >-
            --failOnCVSS 7
            --enableExperimental
            --suppression .github/dependency-check-suppressions.xml
            --data ~/.dependency-check/data
          nvdApiKey: ${{ secrets.NVD_API_KEY }}
        env:
          JAVA_OPTS: "-Xmx2g"

      # -----------------------------------------------------------------------
      # 5. Upload the HTML/XML/JSON scan report as a workflow artifact
      #
      # Engineers can download the artifact from the Actions UI to inspect
      # exactly which CVE(s) triggered the failure and review suppression
      # options.  Retained for 14 days to cover typical sprint cycles.
      # -----------------------------------------------------------------------
      - name: Upload Dependency-Check report
        if: always()   # upload even when the scan step fails so the report is
                       # always available for investigation
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report-${{ github.run_id }}
          path: reports/
          retention-days: 14
